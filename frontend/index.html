<!DOCTYPE html>
<html lang="ru" data-theme="light">
    <head>
        <meta charset="UTF-8">
        <link rel="icon" href="/favicon.ico">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!--
            Цвет хром-баров браузера в тон тёмной палитре приложения (--color-dark-bg).
            Поддерживается Safari iOS 15.4+ / macOS Safari 15+, Chrome Android, Edge,
            Samsung Internet, Brave. На десктопных Firefox/Chrome игнорируется (в Chrome
            работает только в PWA-режиме). apple-mobile-web-app-* нужен на iOS при
            добавлении на домашний экран.
        -->
        <meta name="theme-color" content="#0e2e2e">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <meta name="apple-mobile-web-app-title" content="MedMentor RAG">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,400..600&family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        >
        <link
            href="https://cdn.jsdelivr.net/npm/geist-mono-font@latest/font.css"
            rel="stylesheet"
        >
        <title>MedMentor RAG</title>
    </head>
    <body>
        <div id="app"></div>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
