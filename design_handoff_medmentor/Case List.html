const CATEGORIES = [

const DIFFICULTY_FILTERS = [
  { key: 'all',    label: 'Все уровни' },
  { key: 'easy',   label: 'Лёгкий' },
  { key: 'medium', label: 'Средний' },
  { key: 'hard',   label: 'Сложный' },
];

function App() {
  const [collapsed, setCollapsed] = useState(false);
  const [activeNav, setActiveNav] = useState('cases');
  const [category, setCategory] = useState('Все');
  const [difficulty, setDifficulty] = useState('all');
  const [query, setQuery] = useState('');

  const filtered = useMemo(() => {
    let out = CASES;
    if (category !== 'Все') out = out.filter(c => c.category === category);
    if (difficulty !== 'all') out = out.filter(c => c.difficulty === difficulty);
    if (query.trim()) {
      const q = query.trim().toLowerCase();
      out = out.filter(c =>
        c.title.toLowerCase().includes(q) ||
        c.patientBrief.toLowerCase().includes(q) ||
        c.tags.some(t => t.toLowerCase().includes(q)) ||
        c.patientName.toLowerCase().includes(q)
      );
    }
    return out;
  }, [category, difficulty, query]);

  const counts = useMemo(() => {
    const byCat = {};
    CASES.forEach(c => { byCat[c.category] = (byCat[c.category] || 0) + 1; });
    byCat['Все'] = CASES.length;
    return byCat;
  }, []);

  return (
    <div style={{ display: 'flex', height: '100vh' }}>
      <CaseListSidebar
        collapsed={collapsed}
        onToggle={() => setCollapsed(v => !v)}
        activeNav={activeNav}
        onNavChange={setActiveNav}
      />
      <div style={{ flex: 1, height: '100vh', overflowY: 'auto' }}>
        {/* Top bar */}
        <div style={{
          display: 'flex', alignItems: 'center', gap: 16,
          padding: '14px 28px',
          background: '#fff',
          borderBottom: '0.5px solid rgba(10,31,31,0.08)',
          position: 'sticky', top: 0, zIndex: 10,
        }}>
          <div style={{
            fontSize: 12, color: '#4a6060',
            fontFamily: '"Geist Mono", "JetBrains Mono", ui-monospace, monospace',
            letterSpacing: 0.6,
          }}>
            <span style={{ color: '#7a8f8f' }}>Библиотека</span> <span style={{ margin: '0 6px', color: '#c8d4d3' }}>/</span> <span style={{ color: '#0a1f1f', fontWeight: 500 }}>Каталог кейсов</span>
          </div>
          <div style={{ flex: 1 }} />
          <SearchInput value={query} onChange={setQuery} />
        </div>

        {/* Hero */}
        <div style={{
          background: 'linear-gradient(180deg, #e8f2f1 0%, #f4f7f7 100%)',
          borderBottom: '0.5px solid rgba(10,31,31,0.08)',
          padding: '28px 28px 24px',
        }}>
          <div style={{ maxWidth: 1200, margin: '0 auto' }}>
            <div style={{
              fontFamily: '"Geist Mono", "JetBrains Mono", ui-monospace, monospace', fontSize: 11,
              color: '#0d7377', letterSpacing: 1.4, fontWeight: 600, marginBottom: 10,
            }}>КАТАЛОГ · {CASES.length} КЕЙСОВ · 6 СПЕЦИАЛИЗАЦИЙ</div>
            <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: 28, flexWrap: 'wrap' }}>
              <div style={{ flex: '1 1 420px', minWidth: 0 }}>
                <div style={{
                  fontFamily: 'Fraunces, Georgia, serif',
                  fontSize: 34, letterSpacing: -0.6, lineHeight: 1.1,
                  fontWeight: 500, marginBottom: 6,
                }}>Клинические <em style={{ color: '#0d7377', fontStyle: 'italic' }}>задачи</em></div>
                <div style={{ fontSize: 13.5, color: '#4a6060', lineHeight: 1.55, maxWidth: 620 }}>
                  Симулируемые пациенты по ключевым специализациям. Выберите категорию и уровень сложности, чтобы потренировать сбор анамнеза, дифференциальную диагностику и коммуникацию.
                </div>
              </div>
              <StatStrip />
            </div>
          </div>
        </div>

        {/* Filters */}
        <div style={{ maxWidth: 1200, margin: '0 auto', padding: '20px 28px 0' }}>
          {/* Category chips */}
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 12 }}>
            {CATEGORIES.map(c => (
              <CategoryChip
                key={c.key}
                label={c.key}
                count={counts[c.key] || 0}
                active={category === c.key}
                onClick={() => setCategory(c.key)}
              />
            ))}
          </div>
          {/* Difficulty segmented + results count */}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: 12, marginBottom: 20 }}>
            <DifficultySegmented value={difficulty} onChange={setDifficulty} />
            <div style={{
              fontSize: 12, color: '#4a6060',
              fontFamily: '"Geist Mono", "JetBrains Mono", ui-monospace, monospace',
              letterSpacing: 0.6,
            }}>
              НАЙДЕНО · <span style={{ color: '#0a1f1f', fontWeight: 600 }}>{filtered.length}</span> ИЗ {CASES.length}
            </div>
          </div>
        </div>

        {/* Grid */}
        <div style={{ maxWidth: 1200, margin: '0 auto', padding: '0 28px 40px' }}>
          {filtered.length === 0 ? (
            <EmptyState onReset={() => { setCategory('Все'); setDifficulty('all'); setQuery(''); }} />
          ) : (
            <div style={{
              display: 'grid',
              gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))',
              gap: 16,
            }}>
              {filtered.map((c, i) => (
                <div key={c.id} style={{ animation: `fadeIn 280ms ${i * 30}ms backwards cubic-bezier(0.22,1,0.36,1)` }}>
                  <CaseCard c={c} onOpen={() => window.location.href = 'Case Chat.html'} />
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function diffRank(d) { return { easy: 1, medium: 2, hard: 3 }[d] || 0; }

function CategoryChip({ label, count, active, onClick }) {
  return (
    <div onClick={onClick} style={{
      display: 'inline-flex', alignItems: 'center', gap: 8,
      height: 34, padding: '0 14px', borderRadius: 999,
      background: active ? '#0e2e2e' : '#fff',
      color: active ? '#eaf4f3' : '#0a1f1f',
      border: active ? '0.5px solid #0e2e2e' : '0.5px solid rgba(10,31,31,0.12)',
      fontSize: 13, fontWeight: active ? 500 : 400,
      cursor: 'pointer', userSelect: 'none',
      transition: 'background 160ms, color 160ms, border-color 160ms',
    }}>
      {label}
      <span style={{
        fontSize: 10.5,
        color: active ? '#8fb3b2' : '#7a8f8f',
        fontFamily: '"Geist Mono", "JetBrains Mono", ui-monospace, monospace',
        fontVariantNumeric: 'tabular-nums',
        letterSpacing: 0.4,
      }}>{count}</span>
    </div>
  );
}

function DifficultySegmented({ value, onChange }) {
  return (
    <div style={{
      display: 'inline-flex', padding: 3,
      background: '#fff',
      border: '0.5px solid rgba(10,31,31,0.12)',
      borderRadius: 8,
    }}>
      {DIFFICULTY_FILTERS.map(f => {
        const active = value === f.key;
        const accent = { easy: '#0d7377', medium: '#b58a4e', hard: '#8a2e20' }[f.key];
        return (
          <div key={f.key} onClick={() => onChange(f.key)} style={{
            display: 'inline-flex', alignItems: 'center', gap: 6,
            padding: '5px 12px', borderRadius: 6,
            background: active ? '#f4f7f7' : 'transparent',
            color: active ? '#0a1f1f' : '#4a6060',
            fontSize: 12.5, fontWeight: active ? 500 : 400,
            cursor: 'pointer', whiteSpace: 'nowrap',
            transition: 'background 140ms, color 140ms',
          }}>
            {f.key !== 'all' && (
              <span style={{ display: 'inline-flex', gap: 2 }}>
                {[1, 2, 3].map(i => (
                  <span key={i} style={{
                    width: 4, height: 4, borderRadius: 1,
                    background: accent,
                    opacity: i <= (f.key === 'easy' ? 1 : f.key === 'medium' ? 2 : 3) ? 1 : 0.2,
                  }} />
                ))}
              </span>
            )}
            {f.label}
          </div>
        );
      })}
    </div>
  );
}

function SearchInput({ value, onChange }) {
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 8,
      height: 34, padding: '0 12px',
      background: '#f4f7f7',
      border: '0.5px solid rgba(10,31,31,0.08)',
      borderRadius: 7, width: 280,
    }}>
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ color: '#7a8f8f' }}>
        <circle cx="6" cy="6" r="4.5" stroke="currentColor" strokeWidth="1.2"/>
        <path d="M9.5 9.5L12 12" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/>
      </svg>
      <input
        value={value}
        onChange={e => onChange(e.target.value)}
        placeholder="Поиск по симптомам, пациенту, тегам…"
        style={{
          flex: 1, border: 'none', outline: 'none', background: 'transparent',
          fontSize: 12.5, fontFamily: 'inherit', color: '#0a1f1f',
        }}
      />
      {value && (
        <div onClick={() => onChange('')} style={{ cursor: 'pointer', color: '#7a8f8f', padding: 2 }}>
          <svg width="10" height="10" viewBox="0 0 10 10"><path d="M1 1L9 9M9 1L1 9" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/></svg>
        </div>
      )}
    </div>
  );
}

function StatStrip() {
  const stats = [
    { k: 'Завершено', v: '12', sub: 'из 48' },
    { k: 'Ср. балл',  v: '78', sub: '/100' },
  ];
  return (
    <div style={{ display: 'flex', gap: 10 }}>
      {stats.map(s => (
        <div key={s.k} style={{
          minWidth: 92, padding: '10px 14px',
          background: 'rgba(255,255,255,0.6)',
          border: '0.5px solid rgba(13,115,119,0.18)',
          borderRadius: 10, backdropFilter: 'blur(6px)',
        }}>
          <div style={{
            fontSize: 9.5, letterSpacing: 1.2, color: '#4a6060',
            fontFamily: '"Geist Mono", "JetBrains Mono", ui-monospace, monospace',
            textTransform: 'uppercase', fontWeight: 600, marginBottom: 4,
          }}>{s.k}</div>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 4 }}>
            <div style={{
              fontFamily: 'Fraunces, Georgia, serif',
              fontSize: 24, fontWeight: 500, color: '#0a1f1f', lineHeight: 1,
              fontVariantNumeric: 'tabular-nums',
            }}>{s.v}</div>
            <div style={{ fontSize: 11, color: '#7a8f8f' }}>{s.sub}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

function EmptyState({ onReset }) {
  return (
    <div style={{
      background: '#fff',
      border: '0.5px dashed rgba(10,31,31,0.14)',
      borderRadius: 14,
      padding: '40px 28px',
      textAlign: 'center',
    }}>
      <div style={{
        fontFamily: 'Fraunces, Georgia, serif',
        fontSize: 20, color: '#0a1f1f', marginBottom: 6, fontWeight: 500,
      }}>Ничего не найдено</div>
      <div style={{ fontSize: 13, color: '#4a6060', marginBottom: 14 }}>
        Попробуйте изменить категорию или сложность, либо очистить фильтры.
      </div>
      <button onClick={onReset} style={{
        height: 34, padding: '0 14px', borderRadius: 7,
        background: '#0d7377', color: '#fff', border: 'none',
        fontSize: 12.5, fontWeight: 500, cursor: 'pointer',
        boxShadow: '0 2px 10px rgba(13,115,119,0.3)',
      }}>Сбросить фильтры</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
