<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>MedMentor RAG — клинический тренажёр</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; background:#f4f7f7; font-family: Manrope, -apple-system, system-ui, sans-serif; color:#0a1f1f; }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
  a { color: inherit; text-decoration: none; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(10,31,31,0.15); border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(13,115,119,0.35); }
  ::-webkit-scrollbar-track { background: transparent; }
  .fadein-init { opacity: 0; transform: translateY(24px); }
  .mm-link:hover { color: #0d7377; }
  @keyframes mm-blink { 50% { opacity: 0.3; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://unpkg.com/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

<script type="text/babel" src="landing-components.jsx"></script>
<script type="text/babel" src="landing-modal.jsx"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

function App() {
  const [loginOpen, setLoginOpen] = useState(false);
  const [isLoggedIn, setIsLoggedIn] = useState(() => {
    try { return localStorage.getItem('mm_logged_in') === '1'; } catch (e) { return false; }
  });
  const rootRef = useRef(null);

  useEffect(() => {
    if (!window.gsap || !window.ScrollTrigger) return;
    gsap.registerPlugin(ScrollTrigger);
    const ctx = gsap.context(() => {
      // Hero title — word-by-word
      gsap.fromTo('[data-anim="hero-word"]',
        { y: 32, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.8, stagger: 0.06, ease: 'power3.out', delay: 0.1 }
      );
      gsap.fromTo('[data-anim="hero-sub"]',
        { y: 14, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.8, delay: 0.5, ease: 'power2.out' }
      );
      gsap.fromTo('[data-anim="hero-cta"]',
        { y: 14, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.7, delay: 0.7, stagger: 0.08, ease: 'power2.out' }
      );
      gsap.fromTo('[data-anim="hero-visual"]',
        { y: 40, opacity: 0, scale: 0.96 },
        { y: 0, opacity: 1, scale: 1, duration: 1.1, delay: 0.3, ease: 'power3.out' }
      );
      // Floating hero layers parallax
      gsap.to('[data-anim="hero-float-1"]', { y: -12, duration: 3.2, repeat: -1, yoyo: true, ease: 'sine.inOut' });
      gsap.to('[data-anim="hero-float-2"]', { y: 10, duration: 2.8, repeat: -1, yoyo: true, ease: 'sine.inOut' });

      // Stats — count up
      document.querySelectorAll('[data-count]').forEach(el => {
        const end = parseFloat(el.dataset.count);
        const suffix = el.dataset.suffix || '';
        const obj = { v: 0 };
        ScrollTrigger.create({
          trigger: el,
          start: 'top 85%',
          once: true,
          onEnter: () => {
            gsap.to(obj, {
              v: end, duration: 1.6, ease: 'power2.out',
              onUpdate: () => {
                const v = obj.v;
                el.textContent = (end < 10 ? v.toFixed(1) : Math.round(v).toLocaleString('ru-RU')) + suffix;
              },
            });
          },
        });
      });

      // Generic fade-in-on-scroll
      gsap.utils.toArray('[data-reveal]').forEach(el => {
        gsap.fromTo(el,
          { y: 36, opacity: 0 },
          {
            y: 0, opacity: 1, duration: 0.9, ease: 'power3.out',
            scrollTrigger: { trigger: el, start: 'top 88%', once: true },
          }
        );
      });

      // Stagger children
      gsap.utils.toArray('[data-stagger]').forEach(container => {
        const kids = container.querySelectorAll('[data-stagger-child]');
        gsap.fromTo(kids,
          { y: 32, opacity: 0 },
          {
            y: 0, opacity: 1, duration: 0.8, stagger: 0.11, ease: 'power3.out',
            scrollTrigger: { trigger: container, start: 'top 82%', once: true },
          }
        );
      });

      // Horizontal progress line in How-it-works
      const line = document.querySelector('[data-anim="how-line"]');
      if (line) {
        gsap.fromTo(line,
          { scaleX: 0 },
          {
            scaleX: 1, duration: 1.2, ease: 'power2.inOut',
            scrollTrigger: { trigger: line, start: 'top 80%', once: true },
          }
        );
      }

      // Parallax decorative blob in universities section
      gsap.utils.toArray('[data-parallax]').forEach(el => {
        gsap.to(el, {
          yPercent: -18, ease: 'none',
          scrollTrigger: { trigger: el, start: 'top bottom', end: 'bottom top', scrub: true },
        });
      });
    }, rootRef);
    return () => ctx.revert();
  }, []);

  const goCases = () => { window.location.href = 'Case List.html'; };

  return (
    <div ref={rootRef}>
      <Header onLogin={() => setLoginOpen(true)} onGoCases={goCases} isLoggedIn={isLoggedIn} />
      <Hero onStart={goCases} onLogin={() => setLoginOpen(true)} isLoggedIn={isLoggedIn} />
      <Stats />
      <Features />
      <HowItWorks />
      <FAQ />
      <Footer />
      {loginOpen && (
        <LoginModal
          onClose={() => setLoginOpen(false)}
          onSuccess={() => {
            try { localStorage.setItem('mm_logged_in', '1'); } catch (e) {}
            setIsLoggedIn(true);
            setLoginOpen(false);
            goCases();
          }}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
