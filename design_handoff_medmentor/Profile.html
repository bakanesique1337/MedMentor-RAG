<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MedMentor-RAG — Профиль</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; background:#f4f7f7; font-family: Manrope, -apple-system, system-ui, sans-serif; height: 100%; overflow: hidden; color: #0a1f1f; }
  #root { height: 100vh; }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
  select { font-family: inherit; appearance: none; -webkit-appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M2 4l3 3 3-3' stroke='%237a8f8f' stroke-width='1.3' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
    background-repeat: no-repeat; background-position: right 10px center; padding-right: 28px; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(10,31,31,0.15); border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(13,115,119,0.35); }
  ::-webkit-scrollbar-track { background: transparent; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="case-list-sidebar.jsx"></script>
<script type="text/babel" src="profile-stats.jsx"></script>
<script type="text/babel" src="profile-settings.jsx"></script>

<script type="text/babel">
const { useState, useMemo } = React;

// seed data
const ACTIVITY_30 = (() => {
  // Generate 30 days of (cases/min, theory/min). Today = last.
  const pattern = [
    [35,10],[0,0],[20,15],[45,5],[0,0],[55,20],[25,0],
    [0,0],[30,10],[50,15],[0,5],[40,0],[60,25],[20,0],
    [0,0],[45,10],[0,0],[35,20],[55,15],[30,0],[0,5],
    [0,0],[40,20],[50,0],[65,10],[25,15],[0,0],[45,5],
    [55,20],[42,15],
  ];
  return pattern.map(([c, th]) => ({ m: c + th, th }));
})();

const SPECIALTIES = [
  { name: 'Кардиология',       done: 5, total: 8, score: 84, pair: ['#f0b5a8', '#c4584a'] },
  { name: 'Пульмонология',     done: 3, total: 7, score: 79, pair: ['#cfe2ea', '#5a8ba3'] },
  { name: 'Неврология',        done: 2, total: 9, score: 71, pair: ['#d6ccea', '#6e5d9e'] },
  { name: 'Эндокринология',    done: 1, total: 6, score: 88, pair: ['#ecd5a0', '#b07f2a'] },
  { name: 'Гастроэнтерология', done: 0, total: 7, score: 0,  pair: ['#e8c39a', '#a8713b'] },
  { name: 'Нефрология',        done: 1, total: 5, score: 75, pair: ['#bfd9d7', '#3d7f83'] },
];

const RECENT = [
  { id: 'c-108', title: 'Давящая загрудинная боль с иррадиацией',       patient: 'Пётр Иванов · 54 л.', category: 'Кардиология',    score: 88, date: '19 ноября 2025' },
  { id: 'c-097', title: 'Периодические обмороки при быстром вставании', patient: 'Ольга Петрова · 38 л.', category: 'Неврология',    score: 72, date: '17 ноября 2025' },
  { id: 'c-091', title: 'Одышка и ночной кашель у курильщика',          patient: 'Сергей Козлов · 62 л.', category: 'Пульмонология', score: 84, date: '14 ноября 2025' },
  { id: 'c-085', title: 'Жажда и потеря веса за 2 месяца',               patient: 'Анна Смирнова · 29 л.', category: 'Эндокринология', score: 91, date: '12 ноября 2025' },
  { id: 'c-078', title: 'Головные боли и повышение АД',                 patient: 'Мария Новак · 47 л.', category: 'Кардиология',    score: 79, date: '09 ноября 2025' },
  { id: 'c-070', title: 'Боли в пояснице с иррадиацией в пах',          patient: 'Алексей Федоров · 35 л.', category: 'Нефрология',   score: 68, date: '05 ноября 2025' },
];

const ACHIEVEMENTS = [
  { id: 'a1', title: 'Первый кейс',          hint: 'Завершите один клинический кейс',    glyph: 'I',  unlocked: true  },
  { id: 'a2', title: 'Серия из 5',           hint: '5 дней подряд практики',              glyph: 'V',  unlocked: true  },
  { id: 'a3', title: 'Точный диагноз',       hint: '10 верных Dx подряд',                 glyph: 'Dx', unlocked: true  },
  { id: 'a4', title: 'Кардиолог-стажёр',     hint: 'Все кейсы по кардиологии',            glyph: 'C',  unlocked: false },
  { id: 'a5', title: 'Быстрый анамнез',      hint: 'Завершите кейс за < 8 мин.',          glyph: '8′', unlocked: false },
  { id: 'a6', title: 'Мастер коммуникации',  hint: 'Высокий балл эмпатии в 20 кейсах',    glyph: 'E',  unlocked: false },
];

function App() {
  const [collapsed, setCollapsed] = useState(false);
  const [activeNav, setActiveNav] = useState('profile');
  const [editing, setEditing] = useState(false);
  const [savedProfile, setSavedProfile] = useState(null);
  const [justSaved, setJustSaved] = useState(false);

  const [profile, setProfile] = useState({
    firstName: 'Анна',
    lastName: 'Ковалёва',
    email: 'a.kovaleva@rsmu.ru',
    role: 'Студент',
    course: '5 курс',
    faculty: 'Лечебный факультет',
    university: 'РНИМУ им. Н.И. Пирогова',
    avatarVariant: 'teal',
  });
  const fullName = `${profile.firstName} ${profile.lastName}`.trim();

  const [prefs, setPrefs] = useState([
    { key: 'email_digest', label: 'Еженедельная сводка на email', hint: 'Прогресс, новые кейсы, персональные рекомендации', value: true },
    { key: 'sound',        label: 'Звуковые подсказки',            hint: 'Сигналы при таймауте, завершении кейса',          value: false },
    { key: 'rag_autosuggest', label: 'Авто-подсказки RAG в чате',   hint: 'Система предлагает релевантные гайдлайны',        value: true },
    { key: 'anon_analytics',  label: 'Анонимная аналитика',          hint: 'Помогает улучшать симуляции',                     value: true },
  ]);
  const togglePref = (k) => setPrefs(p => p.map(x => x.key === k ? { ...x, value: !x.value } : x));

  const fields = useMemo(() => ([
    { key: 'firstName',  label: 'Имя',                value: profile.firstName },
    { key: 'lastName',   label: 'Фамилия',            value: profile.lastName },
    { key: 'email',      label: 'Email',              value: profile.email, type: 'email', mono: true },
    { key: 'role',       label: 'Роль',               value: profile.role,       options: ['Студент', 'Ординатор', 'Врач', 'Преподаватель'] },
    { key: 'course',     label: 'Курс / стаж',        value: profile.course,     options: ['1 курс','2 курс','3 курс','4 курс','5 курс','6 курс','Ординатура','Врач'] },
    { key: 'faculty',    label: 'Факультет',          value: profile.faculty,    options: ['Лечебный факультет','Педиатрический факультет','Стоматологический факультет','Медико-биологический факультет'] },
    { key: 'university', label: 'Учебное заведение',  value: profile.university },
  ]), [profile]);

  const onChangeField = (k, v) => setProfile(p => ({ ...p, [k]: v }));

  const startEdit = () => {
    setSavedProfile(profile);
    setEditing(true);
    setJustSaved(false);
  };
  const cancelEdit = () => {
    if (savedProfile) setProfile(savedProfile);
    setEditing(false);
    setSavedProfile(null);
  };
  const applyEdit = () => {
    setSavedProfile(null);
    setEditing(false);
    setJustSaved(true);
    setTimeout(() => setJustSaved(false), 2400);
  };

  return (
    <div style={{ display: 'flex', height: '100vh' }}>
      <CaseListSidebar
        collapsed={collapsed}
        onToggle={() => setCollapsed(v => !v)}
        activeNav={activeNav}
        onNavChange={setActiveNav}
        hideProfileSection
      />
      <div style={{ flex: 1, height: '100vh', overflowY: 'auto' }}>

        {/* Top bar */}
        <div style={{
          display: 'flex', alignItems: 'center', gap: 16,
          padding: '14px 28px',
          background: '#fff',
          borderBottom: '0.5px solid rgba(10,31,31,0.08)',
          position: 'sticky', top: 0, zIndex: 10,
        }}>
          <div style={{ flex: 1 }} />
          <button style={{
            height: 32, padding: '0 14px',
            background: '#fff',
            border: '0.5px solid rgba(138,46,32,0.3)',
            borderRadius: 7,
            color: '#8a2e20',
            fontSize: 12.5, fontWeight: 500, cursor: 'pointer',
          }}
          onMouseEnter={e => {
            e.currentTarget.style.background = 'rgba(138,46,32,0.05)';
            e.currentTarget.style.borderColor = 'rgba(138,46,32,0.45)';
          }}
          onMouseLeave={e => {
            e.currentTarget.style.background = '#fff';
            e.currentTarget.style.borderColor = 'rgba(138,46,32,0.3)';
          }}>
            Выйти из аккаунта
          </button>
        </div>

        <ProfileHero
          name={fullName}
          role={profile.role}
          faculty={`${profile.course} · ${profile.faculty}`}
          university={profile.university}
          avatarVariant={profile.avatarVariant}
          editing={editing}
          onToggleEdit={() => {
            const el = document.getElementById('settings-section');
            if (!el) return;
            // Find nearest scrollable ancestor
            let scroller = el.parentElement;
            while (scroller && scroller !== document.body) {
              const s = getComputedStyle(scroller);
              if (/(auto|scroll)/.test(s.overflowY) && scroller.scrollHeight > scroller.clientHeight) break;
              scroller = scroller.parentElement;
            }
            const target = (scroller && scroller !== document.body) ? scroller : (document.scrollingElement || document.documentElement);
            const elRect = el.getBoundingClientRect();
            const scRect = (target === document.scrollingElement || target === document.documentElement)
              ? { top: 0 }
              : target.getBoundingClientRect();
            const top = elRect.top - scRect.top + target.scrollTop - 16;
            target.scrollTo({ top, behavior: 'smooth' });
          }}
        />

        {/* Main content */}
        <div style={{ maxWidth: 1200, margin: '0 auto', padding: '24px 28px 80px' }}>

          {/* Section: STATS */}
          <SectionHeader eyebrow="ОБЗОР" title="Статистика" hint="Ваш прогресс и активность" />

          {/* Big stats row */}
          <div style={{
            display: 'grid',
            gridTemplateColumns: 'repeat(auto-fit, minmax(170px, 1fr))',
            gap: 14, marginBottom: 18,
          }}>
            <StatBig
              label="ЗАВЕРШЕНО" value="12" sub="/ 48"
              chip="25%" chipTone="teal"
              footer={<StatProgress value={12} max={48} />}
            />
            <StatBig
              label="СРЕДНИЙ БАЛЛ" value="78" sub="/100"
              footer={<StatProgress value={78} max={100} color={PR_PALETTE.teal} />}
            />
            <StatBig
              label="СЕРИЯ" value="7" sub="дней"
              chip="7/14" chipTone="amber"
              footer={<StatSparkline data={[0,1,1,1,1,1,1,0,1,1,1,1,1,1,1]} color={PR_PALETTE.amber} />}
            />
            <StatBig
              label="ПРАКТИКА" value="18" sub="ч."
              chip="ЗА МЕСЯЦ" chipTone="neutral"
              footer={<StatSparkline data={[2,4,3,5,6,8,9,12,10,14,15,14,16,18]} />}
            />
          </div>

          {/* Activity — full width */}
          <div style={{ marginBottom: 18 }}>
            <ActivityChart data={ACTIVITY_30} />
          </div>

          {/* Accuracy donut + Specialty breakdown */}
          <div style={{
            display: 'grid',
            gridTemplateColumns: 'repeat(auto-fit, minmax(320px, 1fr))',
            gap: 14, marginBottom: 18,
          }}>
            <AccuracyDonut correct={9} partial={2} wrong={1} />
            <SpecialtyBars items={SPECIALTIES} />
          </div>

          {/* Recent cases — full width */}
          <div style={{ marginBottom: 36 }}>
            <RecentCases items={RECENT} />
          </div>

          {/* Section: SETTINGS */}
          <div id="settings-section" style={{ scrollMarginTop: 24 }}>
          <SectionHeader
            eyebrow="НАСТРОЙКИ"
            title="Аккаунт"
            hint="Персональные данные"
            action={!editing ? (
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                {justSaved && (
                  <div style={{
                    display: 'inline-flex', alignItems: 'center', gap: 6,
                    fontSize: 12, color: '#0d7377',
                    fontFamily: '"Geist Mono", ui-monospace, monospace',
                    letterSpacing: 0.3,
                    opacity: 1,
                    transition: 'opacity 300ms ease',
                  }}>
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                      <path d="M2.5 6.2L4.8 8.5L9.5 3.5" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                    Изменения сохранены
                  </div>
                )}
                <button onClick={startEdit} style={{
                  height: 32, padding: '0 12px', borderRadius: 7,
                  border: '0.5px solid rgba(10,31,31,0.12)', background: '#fff',
                  color: '#0a1f1f', fontSize: 12, fontWeight: 500, cursor: 'pointer',
                  display: 'inline-flex', alignItems: 'center', gap: 6,
                }}>
                  <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                    <path d="M2 9L3.5 8.5L8.5 3.5L7 2L2 7L2 9Z" stroke="currentColor" strokeWidth="1" strokeLinejoin="round"/>
                  </svg>
                  Редактировать
                </button>
              </div>
            ) : (
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <button onClick={cancelEdit} style={{
                  height: 32, padding: '0 14px', borderRadius: 7,
                  border: '0.5px solid rgba(10,31,31,0.12)', background: '#fff',
                  color: '#4a6060', fontSize: 12.5, fontWeight: 500, cursor: 'pointer',
                }}>
                  Отмена
                </button>
                <button onClick={applyEdit} style={{
                  height: 32, padding: '0 16px', borderRadius: 7,
                  border: '0.5px solid #0d7377', background: '#0d7377',
                  color: '#fff', fontSize: 12.5, fontWeight: 500, cursor: 'pointer',
                  display: 'inline-flex', alignItems: 'center', gap: 6,
                  boxShadow: '0 1px 0 rgba(13,115,119,0.15)',
                }}>
                  <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                    <path d="M2.5 6.2L4.8 8.5L9.5 3.5" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                  Применить
                </button>
              </div>
            )}
          />

          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            <SettingsCard
              fields={fields}
              editing={editing}
              onChange={onChangeField}
              onChangeAvatar={(v) => onChangeField('avatarVariant', v)}
              avatarVariant={profile.avatarVariant}
              name={fullName}
            />
          </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function SectionHeader({ eyebrow, title, hint, action }) {
  return (
    <div style={{
      display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between',
      gap: 16, marginBottom: 16, marginTop: 4,
    }}>
      <div>
        <div style={{
          fontFamily: '"Geist Mono", ui-monospace, monospace',
          fontSize: 10, letterSpacing: 1.4, fontWeight: 600,
          color: '#0d7377', marginBottom: 6,
        }}>{eyebrow}</div>
        <div style={{
          fontFamily: 'Fraunces, Georgia, serif',
          fontSize: 28, letterSpacing: -0.4, lineHeight: 1,
          fontWeight: 500, color: '#0a1f1f',
        }}>{title}</div>
        {hint && <div style={{ fontSize: 12.5, color: '#4a6060', marginTop: 6 }}>{hint}</div>}
      </div>
      {action}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
