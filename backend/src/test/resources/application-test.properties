spring.datasource.url=jdbc:h2:mem:medmentor_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.sql.init.mode=never

spring.ai.google.genai.api-key=test
spring.ai.ollama.base-url=http://localhost:11434
spring.autoconfigure.exclude=org.springframework.ai.model.ollama.autoconfigure.chat.OllamaChatAutoConfiguration,org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration

medmentor.auth.username=doctor
medmentor.auth.password=change_me
medmentor.auth.display-name=Local Doctor
medmentor.cases.path=../cases
