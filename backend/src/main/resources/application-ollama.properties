# Профиль "ollama" — переключает чат-провайдер на локальный Ollama.
# Активация:
#   SPRING_PROFILES_ACTIVE=ollama ./gradlew bootRun
# или передать переменную окружения контейнеру backend через docker compose.
#
# Эмбеддинги работают через Ollama всегда (вне зависимости от профиля),
# здесь меняется только источник чат-модели. Модель и температуру можно
# переопределить через переменные окружения ниже.
# Сбрасываем глобальное исключение Ollama-чата (из application.properties)
# и вместо него отключаем автоконфигурацию Google Gemini, чтобы не падать
# из-за отсутствующего GEMINI_API_KEY и не плодить лишний ChatModel-бин.
spring.autoconfigure.exclude=org.springframework.ai.model.google.genai.autoconfigure.GoogleGenAiChatAutoConfiguration
# Spring AI: явно выбираем Ollama как активного чат-провайдера.
spring.ai.model.chat=ollama
spring.ai.ollama.chat.options.model=${MEDMENTOR_OLLAMA_CHAT_MODEL:qwen3.5:9b}
spring.ai.ollama.chat.options.temperature=${MEDMENTOR_OLLAMA_CHAT_TEMPERATURE:0.7}
spring.ai.ollama.chat.options.think-option=false
# В Ollama-профиле Gemini API-ключ не нужен — даём пустую заглушку,
# чтобы Spring AI не валился при отсутствии переменной.
spring.ai.google.genai.api-key=${GEMINI_API_KEY:not-required}
# Прокидываем те же значения в кастомные свойства приложения,
# чтобы провайдер/модель корректно отображались в логах и метаданных
# (см. AiProperties).
medmentor.ai.provider=ollama
medmentor.ai.model=${MEDMENTOR_OLLAMA_CHAT_MODEL:qwen3.5:9b}
medmentor.ai.temperature=${MEDMENTOR_OLLAMA_CHAT_TEMPERATURE:0.7}
# Подробный лог запросов Spring AI Ollama. Чтобы увидеть RAW HTTP body
# (и убедиться, что в модель уходит именно тот prompt, который мы собрали),
# нужно запустить сам Ollama-сервер с OLLAMA_DEBUG=1 — это единственное
# надёжное место, где видно итоговый prompt. Spring AI RestClient без
# кастомного интерцептора тело запроса не логирует.
logging.level.org.springframework.ai.ollama=DEBUG
