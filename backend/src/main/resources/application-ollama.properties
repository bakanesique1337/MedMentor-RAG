# Профиль "ollama" — переключает чат-провайдер на локальный Ollama.
# Активация:
#   SPRING_PROFILES_ACTIVE=ollama ./gradlew bootRun
# или передать переменную окружения контейнеру backend через docker compose.
spring.autoconfigure.exclude=org.springframework.ai.model.google.genai.autoconfigure.GoogleGenAiChatAutoConfiguration
# Spring AI: явно выбираем Ollama как активного чат-провайдера.
spring.ai.model.chat=ollama
spring.ai.ollama.chat.options.model=${MEDMENTOR_OLLAMA_CHAT_MODEL:qwen3.5:9b}
spring.ai.ollama.chat.options.temperature=${MEDMENTOR_OLLAMA_CHAT_TEMPERATURE:0.7}

spring.ai.google.genai.api-key=${GEMINI_API_KEY:not-required}
medmentor.ai.provider=ollama
medmentor.ai.model=${MEDMENTOR_OLLAMA_CHAT_MODEL:qwen3.5:9b}
medmentor.ai.temperature=${MEDMENTOR_OLLAMA_CHAT_TEMPERATURE:0.7}
logging.level.org.springframework.ai.ollama=DEBUG
