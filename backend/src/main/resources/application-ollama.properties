# Профиль "ollama" — переключает чат-провайдер на локальный Ollama.
# Активация:
#   SPRING_PROFILES_ACTIVE=ollama ./gradlew bootRun
# или передать переменную окружения контейнеру backend через docker compose.
spring.autoconfigure.exclude=org.springframework.ai.model.google.genai.autoconfigure.GoogleGenAiChatAutoConfiguration
# Spring AI: явно выбираем Ollama как активного чат-провайдера.
spring.ai.model.chat=ollama
spring.ai.ollama.chat.options.model=${MEDMENTOR_OLLAMA_CHAT_MODEL:qwen3.5:9b}
spring.ai.ollama.chat.options.temperature=${MEDMENTOR_OLLAMA_CHAT_TEMPERATURE:0.7}
# При переполнении Ollama молча обрезает начало промпта, теряя секцию-override
# patient-role для лаб/инструментальных запросов, после чего qwen видит только
# хвост (предыдущую markdown-таблицу) и продолжает её паттерн бесконечно.
spring.ai.ollama.chat.options.num-ctx=${MEDMENTOR_OLLAMA_CHAT_NUM_CTX:8192}
# Жёсткий верхний предел длины ответа: без него Ollama использует -1 (без
# ограничения), и при срыве модели в повтор поток не завершается до таймаута.
spring.ai.ollama.chat.options.num-predict=${MEDMENTOR_OLLAMA_CHAT_NUM_PREDICT:2048}
# Дефолтный repeat_penalty=1.1 у qwen3 без thinking слабоват для структурированного
# markdown-вывода — модель легко зацикливается на повторении строк таблицы.
spring.ai.ollama.chat.options.repeat-penalty=${MEDMENTOR_OLLAMA_CHAT_REPEAT_PENALTY:1.15}
# Дефолтное окно штрафа — 64 токена; чтобы покрыть длинные
# повторяющиеся фрагменты (целые строки markdown-таблицы).
spring.ai.ollama.chat.options.repeat-last-n=${MEDMENTOR_OLLAMA_CHAT_REPEAT_LAST_N:256}
spring.ai.google.genai.api-key=${GEMINI_API_KEY:not-required}
medmentor.ai.provider=ollama
medmentor.ai.model=${MEDMENTOR_OLLAMA_CHAT_MODEL:qwen3.5:9b}
medmentor.ai.temperature=${MEDMENTOR_OLLAMA_CHAT_TEMPERATURE:0.7}
logging.level.org.springframework.ai.ollama=DEBUG
