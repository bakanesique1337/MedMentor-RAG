# Application Configuration
spring.application.name=medmentor-rag
server.port=8080

# Exclude Ollama Chat AutoConfiguration (we only need embeddings)
spring.autoconfigure.exclude=org.springframework.ai.model.ollama.autoconfigure.chat.OllamaChatAutoConfiguration

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/medmentor
spring.datasource.username=medmentor
spring.datasource.password=medmentor123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Spring AI - Google Gemini Configuration
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash
spring.ai.google.genai.chat.options.temperature=0.7
spring.ai.google.genai.chat.options.max-output-tokens=2048

# Spring AI - Ollama Configuration (embeddings only - chat model disabled via @Qualifier)
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.embedding.options.model=nomic-embed-text
spring.ai.ollama.chat.options.model=nomic-embed-text
spring.ai.ollama.init.pull-model-strategy=never

# Spring AI - PGVector Configuration
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.dimensions=768

# Logging Configuration
logging.level.root=INFO
logging.level.ru.medmentor=INFO
logging.level.org.springframework=INFO
logging.level.org.springframework.ai=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# MedMentor AI Configuration
medmentor.ai.provider=gemini
medmentor.ai.model=gemini-2.5-flash
medmentor.ai.temperature=0.7
medmentor.ai.max-tokens=2048
medmentor.ai.system-prompt=You are a helpful medical AI assistant for the MedMentor application. You assist doctors in practicing their diagnostic skills.
medmentor.ai.constant-context=
medmentor.ai.prompt.global-system=classpath:prompts/global-system.txt
medmentor.ai.prompt.patient-role=classpath:prompts/patient-role.txt
medmentor.ai.prompt.session-opening=classpath:prompts/session-opening.txt
medmentor.ai.prompt.score-review=classpath:prompts/score-review.txt

# MedMentor Authentication Configuration
medmentor.auth.username=${MEDMENTOR_DEFAULT_USERNAME:doctor}
medmentor.auth.password=${MEDMENTOR_DEFAULT_PASSWORD:change_me}
medmentor.auth.display-name=${MEDMENTOR_DEFAULT_DISPLAY_NAME:Local Doctor}
medmentor.auth.allowed-origins=${MEDMENTOR_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}

# MedMentor Case Configuration
medmentor.cases.path=${MEDMENTOR_CASES_PATH:../cases}

# Spring Boot Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.db.enabled=true
