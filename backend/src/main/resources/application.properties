# Application Configuration
spring.application.name=medmentor-rag
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/medmentor
spring.datasource.username=medmentor
spring.datasource.password=medmentor123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Spring AI - Anthropic Claude Configuration
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
spring.ai.anthropic.chat.options.model=claude-haiku-4-5-20251001
spring.ai.anthropic.chat.options.temperature=0.7
spring.ai.anthropic.chat.options.max-tokens=2048

# Spring AI - PostgresML Embeddings Configuration
spring.ai.postgresml.embedding.datasource.url=jdbc:postgresql://localhost:5433/postgres
spring.ai.postgresml.embedding.datasource.username=postgres
spring.ai.postgresml.embedding.datasource.password=postgresml
spring.ai.postgresml.embedding.options.transformer=intfloat/e5-small-v2
spring.ai.postgresml.embedding.options.vectorType=PG_VECTOR

# Spring AI - PGVector Configuration
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.dimensions=384

# Logging Configuration
logging.level.root=INFO
logging.level.ru.medmentor=INFO
logging.level.org.springframework=INFO
logging.level.org.springframework.ai=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# MedMentor AI Configuration
medmentor.ai.provider=anthropic
medmentor.ai.model=claude-haiku-4-5-20251001
medmentor.ai.temperature=0.7
medmentor.ai.max-tokens=2048
medmentor.ai.system-prompt=You are a helpful medical AI assistant for the MedMentor application. You assist doctors in practicing their diagnostic skills.
medmentor.ai.constant-context=

# Spring Boot Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.db.enabled=true